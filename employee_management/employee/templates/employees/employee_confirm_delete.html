{% extends "base.html" %}
{% block title %}Delete Employee{% endblock %}

{% block content %}
<div class="stack">
  <div>
    <h1 class="page-title">Delete Employee</h1>
    <p class="page-subtitle">This action cannot be undone.</p>
  </div>
  <p>Are you sure you want to delete "{{ employee.name }}"?</p>

  <form method="post">
    {% csrf_token %}
    <div class="inline-actions">
      <button type="submit">Yes, delete</button>
      <a href="{% url 'dashboard' %}">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
