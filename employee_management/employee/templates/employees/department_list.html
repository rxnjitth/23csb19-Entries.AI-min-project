{% extends "base.html" %}
{% block title %}Departments{% endblock %}

{% block content %}
<div class="stack">
  <div>
    <h1 class="page-title">Departments</h1>
  </div>

  <ul>
    {% for d in departments %}
      <li>{{ d.name }} - <a class="edit-link" href="#">Edit</a></li>
    {% empty %}
      <li>No departments yet.</li>
    {% endfor %}
  </ul>

  <p><a href="{% url 'dashboard' %}">Back to dashboard</a></p>
</div>

{% endblock %}
