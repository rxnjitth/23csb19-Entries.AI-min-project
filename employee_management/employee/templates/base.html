<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}Employee Management System{% endblock %}</title>
</head>
<body>

{% if user.is_authenticated %}
  <nav>
    <strong>Employee Management System</strong> | <a href="{% url 'dashboard' %}">Dashboard</a> | <a href="{% url 'employee_create' %}">Add Employee</a> | <a href="{% url 'logout' %}">Logout</a>
  </nav>
{% endif %}

<div>{% block topbar %}{% endblock %}</div>

<main>
  {% if messages %}
    {% for msg in messages %}
      <div>{{ msg }}</div>
    {% endfor %}
  {% endif %}

  <section>
    {% block content %}{% endblock %}
  </section>
</main>

</body>
</html>
