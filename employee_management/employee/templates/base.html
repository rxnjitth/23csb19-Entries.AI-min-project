<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}Employee Management System{% endblock %}</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-alt: #eef3ff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d7deea;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --danger: #dc2626;
      --success: #16a34a;
      --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      --radius: 16px;
      --radius-sm: 10px;
      --max-width: 1100px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(180deg, #f8fbff 0%, #eef4ff 100%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    a {
      color: var(--primary);
      text-decoration: none;
    }

    a:hover {
      color: var(--primary-dark);
      text-decoration: underline;
    }

    .site-shell {
      width: min(100% - 32px, var(--max-width));
      margin: 0 auto;
      padding: 24px 0 48px;
    }

    .site-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 20px;
      margin-bottom: 24px;
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(215, 222, 234, 0.8);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      flex-wrap: wrap;
    }

    .site-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .site-brand-mark {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: var(--primary);
      box-shadow: 0 0 0 6px rgba(37, 99, 235, 0.12);
    }

    .site-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .site-actions a,
    .button,
    button,
    input[type="submit"] {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 42px;
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid transparent;
      background: var(--primary);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
    }

    .site-actions a:hover,
    .button:hover,
    button:hover,
    input[type="submit"]:hover {
      background: var(--primary-dark);
      text-decoration: none;
      transform: translateY(-1px);
    }

    .site-actions a[href*="logout"],
    .danger,
    .danger button {
      background: var(--danger);
    }

    .site-actions a[href*="logout"]:hover,
    .danger:hover,
    .danger button:hover {
      background: #b91c1c;
    }

    main {
      display: block;
    }

    .content-card,
    .auth-card,
    .panel,
    .stats-grid > div,
    table,
    .notice {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .content-card,
    .auth-card,
    .panel {
      padding: 24px;
    }

    .page-title {
      margin: 0 0 12px;
      font-size: clamp(1.6rem, 2vw, 2.2rem);
      line-height: 1.2;
    }

    .page-subtitle {
      margin: 6px 0 0;
      color: var(--muted);
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .topbar-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .messages {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
    }

    .message {
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface-alt);
    }

    .welcome {
      margin-bottom: 16px;
      padding: 14px 18px;
      border-left: 5px solid var(--primary);
      background: var(--surface);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow);
      font-weight: 600;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }

    .stats-grid > div {
      padding: 20px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
    }

    .stats-label {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .stats-value {
      margin-top: 8px;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .panel + .panel {
      margin-top: 18px;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    form {
      display: grid;
      gap: 14px;
    }

    form > div {
      display: grid;
      gap: 8px;
    }

    label {
      font-weight: 600;
    }

    input, select, textarea {
      width: 100%;
      min-height: 44px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: #fff;
      color: var(--text);
      font: inherit;
    }

    input:focus, select:focus, textarea:focus {
      outline: 2px solid rgba(37, 99, 235, 0.18);
      border-color: var(--primary);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
    }

    th, td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #f8fbff;
      font-size: 0.92rem;
      color: var(--muted);
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    tbody tr:hover {
      background: #fafcff;
    }

    ul {
      padding-left: 20px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .actions a {
      background: #eef4ff;
      color: var(--primary-dark);
      border: 1px solid #d8e3ff;
    }

    .actions a:hover {
      background: #dbe7ff;
    }

    /* Edit (yellow) and Delete (red) link styles */
    .edit-link {
      display: inline-block;
      padding: 8px 12px;
      background: #fef3c7; /* warm yellow */
      color: #92400e; /* dark amber */
      border: 1px solid #f59e0b;
      border-radius: 10px;
      font-weight: 700;
    }

    .edit-link:hover {
      background: #fef08a;
      color: #78350f;
    }

    .delete-link {
      display: inline-block;
      padding: 8px 12px;
      background: #fee2e2; /* light red */
      color: #7f1d1d; /* dark red */
      border: 1px solid #ef4444;
      border-radius: 10px;
      font-weight: 700;
    }

    .delete-link:hover {
      background: #fecaca;
      color: #6b1212;
    }

    .muted {
      color: var(--muted);
    }

    .stack {
      display: grid;
      gap: 14px;
    }

    .inline-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    @media (max-width: 1024px) {
      .site-shell { padding-left: 18px; padding-right: 18px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 720px) {
      .site-nav,
      .topbar,
      .panel-header {
        align-items: stretch;
      }

      .site-nav { padding: 12px; }
      .site-actions { width: 100%; justify-content: flex-end; }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .content-card, .panel, .auth-card { padding: 16px; }

      .site-actions a,
      .button,
      button,
      input[type="submit"] {
        min-height: 40px;
        padding: 8px 12px;
      }

      .table-responsive {
        overflow: auto;
        -webkit-overflow-scrolling: touch;
      }

      /* Only apply stacked layout when using .stacked-table wrapper */
      .stacked-table table,
      .stacked-table thead,
      .stacked-table tbody,
      .stacked-table th,
      .stacked-table td,
      .stacked-table tr {
        display: block;
      }

      .stacked-table thead {
        position: absolute;
        left: -9999px;
      }

      .stacked-table tr {
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        margin-bottom: 14px;
        overflow: hidden;
        background: #fff;
      }

      .stacked-table td {
        border-bottom: 1px solid var(--border);
      }

      .stacked-table td:last-child {
        border-bottom: 0;
      }
    }

    @media (max-width: 420px) {
      .site-brand span { font-size: 0.95rem; }
      .page-title { font-size: 1.25rem; }
      .site-actions { justify-content: center; gap: 8px; }
      .site-actions a, .button, button, input[type="submit"] { width: 100%; }
      .edit-link, .delete-link { width: auto; padding: 8px 10px; }
    }
  </style>
</head>
<body>

<div class="site-shell">
  {% if user.is_authenticated %}
    <nav class="site-nav">
      <div class="site-brand">
        <span class="site-brand-mark"></span>
        <span>Employee Management System</span>
      </div>
      <div class="site-actions">
        <a href="{% url 'dashboard' %}">Dashboard</a>
        <a href="{% url 'employee_create' %}">Add Employee</a>
        <a href="{% url 'logout' %}">Logout</a>
      </div>
    </nav>
  {% endif %}

  {% block topbar %}
  {% endblock %}

  <main>
    {% if messages %}
      <div class="messages">
        {% for msg in messages %}
          <div class="message">{{ msg }}</div>
        {% endfor %}
      </div>
    {% endif %}

    <section class="content-card">
      {% block content %}{% endblock %}
    </section>
  </main>
</div>

</body>
</html>
